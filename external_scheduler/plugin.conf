[global]
# Profile used when a request does not specify a profile hint.
default_profile=default

# Scheduler hint key used by a request to select a profile.
profile_hint_key=ext_sched_profile

# What to do when a request asks for an unknown profile: reject or default.
unknown_profile_policy=reject

[profile:default]
# Entry point names from nova.scheduler.external_scheduler.filters.
filters=CpuLoadFilter

# Entry point names from nova.scheduler.external_scheduler.weighers.
weighers=CpuLoadWeight

[prometheus]
# Prometheus endpoint URL (or a list of URLs separated by commas).
# If multiple endpoints are provided, one is randomly selected at each request to distribute the load.
endpoint = http://localhost/api/v1/query

# Timeout in seconds before falling back to default values.
timeout  = 5.0

[cpu_load]
# Exclude from monitoring any host with fewer than X vCPUs allocated (expressed as a float ratio of its total capacity).
# These hosts pass filtering and are treated with a neutral weight.
exclude_alloc = 0.85

# Target host CPU load when calculating oversubscription level (float ratio between 0 and 1).
load     = 0.85

# Conservative prediction margin (z-score as a float). The higher the value, the more conservative the estimate.
degree   = 2.0
